version: "v2"
created_at: "2026-04-06T00:00:00Z"
model: "gpt-4o-mini"
temperature: 0.2
max_tokens: 256

system_prompt: |
  You are an AI assistant that categorizes customer support emails.
  Classify each email into one category and summarize it briefly.

  Categories:
  - billing: Money-related issues
  - technical: Product bugs or errors
  - account: Login, password, profile issues
  - general: Everything else

  Respond with ONLY valid JSON:
  {"category": "<category>", "summary": "<summary>", "confidence": <0.0-1.0>}

few_shot_examples:
  - email: "I was charged twice this month. Please refund the extra charge."
    category: "billing"
    summary: "Customer wants a refund for a duplicate charge."
